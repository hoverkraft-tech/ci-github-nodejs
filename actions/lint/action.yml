name: "Lint"
description: "Action to lint Node.js projects with support for pull request reporting and annotations"
author: hoverkraft
branding:
  icon: check-circle
  color: blue

inputs:
  working-directory:
    description: |
      Working directory where lint commands are executed.
      Can be absolute or relative to the repository root.
    required: false
    default: "."
  container:
    description: "Whether running in container mode (skips checkout and node setup)"
    required: false
    default: "false"
  command:
    description: |
      npm/pnpm/Yarn script command to run for linting.
      This should be a script defined in your `package.json`.
      The command should generate lint report files in a standard format.

      ESLint: `eslint --format json -o eslint-report.json .`
      Prettier: `prettier --check . | tee prettier-report.txt`
      Astro: `astro check | tee astro-report.txt`
    required: false
    default: "lint:ci"
  report-file:
    description: |
      Optional lint report path forwarded to the [parse-ci-reports](https://github.com/hoverkraft-tech/ci-github-common/tree/main/actions/parse-ci-reports) action.
      Provide an absolute path or one relative to the working directory.
      When omitted, the action falls back to `auto:lint` detection.
    required: false
    default: ""
  path-mapping:
    description: |
      Optional path mapping to adjust file paths in test and coverage reports.
      See the [parse-ci-reports documentation](https://github.com/hoverkraft-tech/ci-github-common/tree/main/actions/parse-ci-reports) for details.
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - uses: hoverkraft-tech/ci-github-common/actions/local-actions@71b85947453f32b5d147ff3ab37351439a92d840 # 0.34.2
      with:
        source-path: ${{ github.action_path }}/..

    - id: working-directory
      uses: hoverkraft-tech/ci-github-common/actions/working-directory@71b85947453f32b5d147ff3ab37351439a92d840 # 0.34.2
      with:
        working-directory: ${{ inputs.working-directory }}
        enforce-path-in-workspace: ${{ inputs.container && 'false' || 'true' }}

    - id: setup-node
      if: inputs.container != 'true'
      uses: ./../self-actions/setup-node
      with:
        working-directory: ${{ steps.working-directory.outputs.absolute-path }}
        dependencies-cache: |
          nx
          prettier

    - id: get-package-manager
      if: inputs.container == 'true'
      uses: ./../self-actions/get-package-manager
      with:
        working-directory: ${{ steps.working-directory.outputs.absolute-path }}

    - id: run-lint
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        RUN_LINT_COMMAND: ${{ inputs.container == 'true' && steps.get-package-manager.outputs.run-script-command || steps.setup-node.outputs.run-script-command }}
        WORKING_DIRECTORY: ${{ steps.working-directory.outputs.absolute-path }}
        LINT_COMMAND: ${{ inputs.command }}
      with:
        script: |
          const workingDirectory = process.env.WORKING_DIRECTORY;
          core.debug(`Running in working directory: ${workingDirectory}`);
          process.chdir(workingDirectory);

          const runScriptCommand = process.env.RUN_LINT_COMMAND;
          const lintCommand = process.env.LINT_COMMAND || 'lint:ci';

          core.info(`👕 Running lint command: ${lintCommand}...`);

          try {
            const exitCode = await exec.exec(runScriptCommand, [lintCommand], {
              cwd: workingDirectory,
              ignoreReturnCode: true
            });

            core.setOutput('lint-exit-code', exitCode);

            if (exitCode !== 0) {
              core.setFailed(`Linting failed with exit code ${exitCode}`);
            }
          } catch (error) {
            core.setOutput('lint-exit-code', 1);
            core.setFailed(`Linting error: ${error.message}`);
          }

    - name: 📊 Parse lint reports
      if: always()
      uses: hoverkraft-tech/ci-github-common/actions/parse-ci-reports@71b85947453f32b5d147ff3ab37351439a92d840 # 0.34.2
      with:
        working-directory: ${{ steps.working-directory.outputs.absolute-path }}
        report-paths: ${{ inputs.report-file || 'auto:lint' }}
        path-mapping: ${{ inputs.path-mapping }}
        report-name: "Lint Results"
        output-format: "annotations,summary"
